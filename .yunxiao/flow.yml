# 云效 Flow 流水线 - hera-daemon 自动发布
#
# 触发：推送 v* tag（如 v4.10.0）自动构建 arm64 + amd64 deb
#
# ── 一次性前置配置 ────────────────────────────────────────────────────
# 1. 云效 → 服务连接 → 新建 Codeup 服务连接，将 serviceConnection ID
#    填入下方 sources.recorder.certificate.serviceConnection
# 2. 云效 → 制品仓库 → 新建通用制品仓库（名称随意，ArtifactUpload 使用
#    流水线内置存储 flowPublic，无需额外配置）
# 3. （可选）流水线 → 环境变量 → 新增私密变量 INSTA_SDK_OSS_URL
#    值为 Insta360 CameraSDK arm64 包的 OSS presigned URL
#    未设置时构建不含摄像头驱动，其余功能正常
# ─────────────────────────────────────────────────────────────────────

name: hera-release

# ── 代码源与触发条件 ──────────────────────────────────────────────────
sources:
  recorder:
    type: codeup
    name: recorder
    endpoint: git@codeup.aliyun.com:67b2bda9b5800b3679b8680e/hera/recorder.git
    branch: master
    triggerEvents:
      - tagPush
    # 只有 v 开头的 tag（如 v4.10.0）才触发流水线
    branchesFilter: "v.*"
    certificate:
      type: serviceConnection
      # 替换为实际的服务连接 ID（云效 → 服务连接 → Codeup → 复制 ID）
      serviceConnection: "<YOUR_SERVICE_CONNECTION_ID>"

# ── 流水线阶段 ────────────────────────────────────────────────────────
stages:
  # ── Stage 1: 并行构建 arm64 + amd64 ─────────────────────────────────
  build_stage:
    name: 编译
    jobs:

      # ── Job A: arm64 Jetson deb（主要产物）────────────────────────────
      # 使用 Docker buildx + QEMU 在 x86 runner 上模拟 arm64 环境编译。
      # 若要更快的原生构建，将 runsOn 改为注册了 Jetson 的私有资源组：
      #   runsOn: private/<your-runner-group-id>
      # 并在 Jetson 上安装云效 Runner Agent 后注册。
      build_arm64:
        name: 编译 arm64 (Jetson)
        runsOn: public/cn-hangzhou

        steps:
          extract_version_arm64:
            step: Command
            name: 提取版本号
            with:
              run: |
                # tag push 时 PIPELINE_GIT_BRANCH 通常为 refs/tags/v4.10.0
                TAG="${PIPELINE_GIT_BRANCH:-}"
                VERSION="${TAG#refs/tags/}"
                VERSION="${VERSION#v}"
                [ -z "${VERSION}" ] && VERSION="dev"
                echo "VERSION=${VERSION}" >> "${PIPELINE_ENV}"
                echo "[ci] arm64 version = ${VERSION}"

          setup_qemu:
            step: Command
            name: 注册 QEMU arm64 模拟器
            with:
              run: |
                docker version
                docker run --rm --privileged \
                  tonistiigi/binfmt:latest --install arm64
                docker buildx create --use --name arm64-builder \
                  --driver docker-container 2>/dev/null || true
                docker buildx inspect arm64-builder --bootstrap

          build_deb_arm64:
            step: Command
            name: 构建 arm64 deb
            with:
              run: |
                SDK_ARG=""
                if [ -n "${INSTA_SDK_OSS_URL:-}" ]; then
                  SDK_ARG="--build-arg INSTA_SDK_URL=${INSTA_SDK_OSS_URL}"
                fi

                mkdir -p dist
                docker buildx build \
                  --platform linux/arm64 \
                  --builder arm64-builder \
                  --build-arg VERSION="${VERSION}" \
                  ${SDK_ARG} \
                  --output "type=local,dest=./dist" \
                  -f cloud/docker/Dockerfile.build-arm64 \
                  .

                echo "[ci] arm64 产物："
                ls -lh dist/*.deb

          upload_arm64:
            step: ArtifactUpload
            name: 上传 arm64 deb
            with:
              uploadType: flowPublic
              artifact: arm64_deb
              filePath:
                - dist/

      # ── Job B: amd64 deb ─────────────────────────────────────────────
      build_amd64:
        name: 编译 amd64
        runsOn:
          group: public/cn-hangzhou
          container: ubuntu:22.04

        steps:
          extract_version_amd64:
            step: Command
            name: 提取版本号
            with:
              run: |
                TAG="${PIPELINE_GIT_BRANCH:-}"
                VERSION="${TAG#refs/tags/}"
                VERSION="${VERSION#v}"
                [ -z "${VERSION}" ] && VERSION="dev"
                echo "VERSION=${VERSION}" >> "${PIPELINE_ENV}"
                echo "[ci] amd64 version = ${VERSION}"

          install_deps:
            step: Command
            name: 安装编译依赖
            with:
              run: |
                export DEBIAN_FRONTEND=noninteractive
                apt-get update -qq
                apt-get install -y --no-install-recommends \
                  build-essential cmake make git pkg-config \
                  libusb-1.0-0-dev \
                  libboost-dev libboost-filesystem-dev libboost-thread-dev \
                  libboost-program-options-dev \
                  libevent-dev libconfig++-dev \
                  libthrift-dev thrift-compiler \
                  libturbojpeg0-dev \
                  dpkg-dev
                # turbojpeg cmake 路径适配
                mkdir -p /opt/libjpeg-turbo/lib64 /opt/libjpeg-turbo/include
                ln -sf /usr/lib/x86_64-linux-gnu/libturbojpeg.so \
                       /opt/libjpeg-turbo/lib64/libturbojpeg.so
                ln -sf /usr/include/turbojpeg.h \
                       /opt/libjpeg-turbo/include/turbojpeg.h

          compile_amd64:
            step: Command
            name: 编译
            with:
              run: |
                mkdir -p build_amd64 && cd build_amd64
                cmake .. \
                  -DCMAKE_BUILD_TYPE=Release \
                  -DWITH_DAEMON=ON \
                  -DWITH_REPLAY=ON \
                  -DWITH_CONVERT=OFF \
                  -DWITH_SLAM=OFF \
                  -DWITH_GIT_INFO=OFF \
                  -DJPEG_TURBO_ROOT_DIR=/opt/libjpeg-turbo \
                  -Dforce-git-info="${VERSION}"
                make -j"$(nproc)"

          package_amd64:
            step: Command
            name: 打包 deb
            with:
              run: |
                bash scripts/make_artifacts.sh amd64
                mkdir -p dist
                bash scripts/make_deb.sh "${VERSION}" artifacts dist amd64
                echo "[ci] amd64 产物："
                ls -lh dist/*.deb

          upload_amd64:
            step: ArtifactUpload
            name: 上传 amd64 deb
            with:
              uploadType: flowPublic
              artifact: amd64_deb
              filePath:
                - dist/

  # ── Stage 2: 汇总 ────────────────────────────────────────────────────
  release_stage:
    name: 发布汇总
    jobs:
      notify:
        name: 打印产物信息
        runsOn: public/cn-hangzhou
        steps:
          print_info:
            step: Command
            name: 发布完成
            with:
              run: |
                TAG="${PIPELINE_GIT_BRANCH:-}"
                VERSION="${TAG#refs/tags/}"
                VERSION="${VERSION#v}"
                echo "=========================================="
                echo "  hera-daemon v${VERSION} 发布完成"
                echo "=========================================="
                echo ""
                echo "制品（可在云效 → 制品 中下载）："
                echo "  arm64: hera-daemon_${VERSION}_arm64.deb"
                echo "  amd64: hera-daemon_${VERSION}_amd64.deb"
                echo ""
                echo "Jetson 安装："
                echo "  sudo dpkg -i hera-daemon_${VERSION}_arm64.deb"
