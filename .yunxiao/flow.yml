name: hera-release

# 触发：推送 v* tag（如 v4.10.0）自动构建 arm64 deb
sources:
  recorder:
    type: codeup
    name: recorder
    endpoint: git@codeup.aliyun.com:67b2bda9b5800b3679b8680e/hera/recorder.git
    branch: master
    triggerEvents:
      - tagPush
    certificate:
      type: serviceConnection
      serviceConnection: "chpyo6irermpccfa"

stages:
  build_stage:
    name: 编译
    jobs:

      # arm64 Jetson deb —— aarch64 交叉编译（公共 runner ubuntu:22.04）
      # export ARCH=aarch64 确保插件命名为 *-aarch64-*.so，否则 Jetson 加载失败
      build_arm64:
        name: 编译 arm64
        runsOn:
          group: public/cn-hangzhou
          container: crpi-wzvoh0tsm7bwb22w.cn-shanghai.personal.cr.aliyuncs.com/glim/cicd:ubuntu2204

        steps:
          extract_version:
            step: Command
            name: 提取版本号
            with:
              run: |
                TAG="${GIT_BRANCH:-${PIPELINE_GIT_BRANCH:-}}"
                VERSION="${TAG#refs/tags/}"
                VERSION="${VERSION#v}"
                [ -z "${VERSION}" ] && VERSION="dev"
                echo "${VERSION}" > "${WORK_SPACE}/build_version"
                echo "[ci] version = ${VERSION}"

          install_deps:
            step: Command
            name: 安装 aarch64 交叉编译依赖
            with:
              run: |
                echo "OS: $(. /etc/os-release && echo $PRETTY_NAME)"
                export DEBIAN_FRONTEND=noninteractive
                dpkg --add-architecture arm64
                # 限制默认源只走 amd64，arm64 单独指向 ports
                sed -i 's/^deb /deb [arch=amd64] /' /etc/apt/sources.list \
                  2>/dev/null || true
                if [ -d /etc/apt/sources.list.d ]; then
                  for f in /etc/apt/sources.list.d/*.list; do
                    sed -i 's/^deb /deb [arch=amd64] /' "$f" 2>/dev/null || true
                  done
                fi
                # 添加 arm64 包源（Debian ports）
                . /etc/os-release
                CODENAME="${VERSION_CODENAME:-bookworm}"
                cat > /etc/apt/sources.list.d/arm64-ports.list << EOF
deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports ${CODENAME} main restricted universe multiverse
deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports ${CODENAME}-updates main restricted universe multiverse
deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports ${CODENAME}-security main restricted universe multiverse
EOF
                # Debian 用 debian ports
                if [ "${ID}" = "debian" ]; then
                  cat > /etc/apt/sources.list.d/arm64-ports.list << EOF
deb [arch=arm64] http://ftp.ports.debian.org/debian-ports/ ${CODENAME} main
EOF
                fi
                apt-get update -qq
                apt-get install -y --no-install-recommends \
                  gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
                  cmake make git pkg-config dpkg-dev \
                  thrift-compiler \
                  libboost-dev:arm64 libboost-filesystem-dev:arm64 \
                  libboost-thread-dev:arm64 libboost-program-options-dev:arm64 \
                  libevent-dev:arm64 libconfig++-dev:arm64 \
                  libthrift-dev:arm64 \
                  libturbojpeg0-dev:arm64 \
                  libusb-1.0-0-dev:arm64
                mkdir -p /opt/libjpeg-turbo/lib64 /opt/libjpeg-turbo/include
                ln -sf /usr/lib/aarch64-linux-gnu/libturbojpeg.so \
                       /opt/libjpeg-turbo/lib64/libturbojpeg.so
                ln -sf /usr/include/turbojpeg.h \
                       /opt/libjpeg-turbo/include/turbojpeg.h

          compile:
            step: Command
            name: 交叉编译 arm64
            with:
              run: |
                VERSION="$(cat "${WORK_SPACE}/build_version")"
                export ARCH=aarch64
                git config --global --add safe.directory "${WORK_SPACE}"
                export PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig
                export PKG_CONFIG_LIBDIR=/usr/lib/aarch64-linux-gnu/pkgconfig
                mkdir -p build_arm64 && cd build_arm64
                cmake .. \
                  -DCMAKE_TOOLCHAIN_FILE=../cmake/toolchain-aarch64.cmake \
                  -DCMAKE_BUILD_TYPE=Release \
                  -DWITH_DAEMON=ON \
                  -DWITH_REPLAY=ON \
                  -DWITH_CONVERT=OFF \
                  -DWITH_SLAM=OFF \
                  -DWITH_GIT_INFO=OFF \
                  -DCMAKE_LIBRARY_PATH=/usr/lib/aarch64-linux-gnu \
                  -DJPEG_TURBO_ROOT_DIR=/opt/libjpeg-turbo \
                  -Dforce-git-info="${VERSION}"
                make -j"$(nproc)"

          package:
            step: Command
            name: 打包 arm64 deb
            with:
              run: |
                VERSION="$(cat "${WORK_SPACE}/build_version")"
                bash scripts/make_artifacts.sh arm64
                mkdir -p dist
                bash scripts/make_deb.sh "${VERSION}" artifacts dist arm64
                echo "===== 产物 ====="
                ls -lh dist/*.deb
