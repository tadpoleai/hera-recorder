# 云效 Flow 流水线 - hera-daemon 自动发布
#
# 触发：推送 v* tag（如 v4.10.0）自动构建 arm64 + amd64 deb
#
# ── 一次性前置配置 ────────────────────────────────────────────────────
# 1. 云效 → 服务连接 → 新建 Codeup 服务连接，将 serviceConnection ID
#    填入下方 sources.recorder.certificate.serviceConnection
# 2. 云效 → 制品仓库 → 新建通用制品仓库（名称随意，ArtifactUpload 使用
#    流水线内置存储 flowPublic，无需额外配置）
# 3. （可选）流水线 → 环境变量 → 新增私密变量 INSTA_SDK_OSS_URL
#    值为 Insta360 CameraSDK arm64 包的 OSS presigned URL
#    未设置时构建不含摄像头驱动，其余功能正常
# ─────────────────────────────────────────────────────────────────────

name: hera-release

# ── 代码源与触发条件 ──────────────────────────────────────────────────
sources:
  recorder:
    type: codeup
    name: recorder
    endpoint: git@codeup.aliyun.com:67b2bda9b5800b3679b8680e/hera/recorder.git
    branch: master
    triggerEvents:
      - tagPush
    # 只有 v 开头的 tag（如 v4.10.0）才触发流水线
    branchesFilter: "v.*"
    certificate:
      type: serviceConnection
      # 替换为实际的服务连接 ID（云效 → 服务连接 → Codeup → 复制 ID）
      serviceConnection: "chpyo6irermpccfa"

# ── 流水线阶段 ────────────────────────────────────────────────────────
stages:
  # ── Stage 1: 并行构建 arm64 + amd64 ─────────────────────────────────
  build_stage:
    name: 编译
    jobs:

      # ── Job A: arm64 Jetson deb（aarch64 交叉编译）─────────────────────
      # 在 ubuntu:22.04 容器内用 gcc-aarch64-linux-gnu 交叉编译。
      # 云效公共 runner 无 network namespace 权限，Docker+QEMU 方案不可用。
      # 若要使用 Jetson 原生构建，可将 runsOn 改为自托管 arm64 runner：
      #   runsOn: private/<your-runner-group-id>
      build_arm64:
        name: 编译 arm64 (aarch64 交叉编译)
        runsOn:
          group: public/cn-hangzhou
          container: ubuntu:22.04

        steps:
          extract_version_arm64:
            step: Command
            name: 提取版本号
            with:
              run: |
                TAG="${GIT_BRANCH:-${PIPELINE_GIT_BRANCH:-}}"
                VERSION="${TAG#refs/tags/}"
                VERSION="${VERSION#v}"
                [ -z "${VERSION}" ] && VERSION="dev"
                echo "${VERSION}" > "${WORK_SPACE}/build_version_arm64"
                echo "[ci] arm64 version = ${VERSION}"

          install_deps_arm64:
            step: Command
            name: 安装 aarch64 交叉编译依赖
            with:
              run: |
                export DEBIAN_FRONTEND=noninteractive
                dpkg --add-architecture arm64
                apt-get update -qq
                apt-get install -y --no-install-recommends \
                  gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
                  cmake make git pkg-config dpkg-dev \
                  thrift-compiler \
                  libboost-dev:arm64 libboost-filesystem-dev:arm64 \
                  libboost-thread-dev:arm64 libboost-program-options-dev:arm64 \
                  libevent-dev:arm64 libconfig++-dev:arm64 \
                  libthrift-dev:arm64 \
                  libturbojpeg0-dev:arm64 \
                  libusb-1.0-0-dev:arm64
                mkdir -p /opt/libjpeg-turbo/lib64 /opt/libjpeg-turbo/include
                ln -sf /usr/lib/aarch64-linux-gnu/libturbojpeg.so \
                       /opt/libjpeg-turbo/lib64/libturbojpeg.so
                ln -sf /usr/include/turbojpeg.h \
                       /opt/libjpeg-turbo/include/turbojpeg.h

          compile_arm64:
            step: Command
            name: 交叉编译 arm64
            with:
              run: |
                VERSION="$(cat "${WORK_SPACE}/build_version_arm64")"
                export PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig
                export PKG_CONFIG_LIBDIR=/usr/lib/aarch64-linux-gnu/pkgconfig
                mkdir -p build_arm64 && cd build_arm64
                cmake .. \
                  -DCMAKE_TOOLCHAIN_FILE=../cmake/toolchain-aarch64.cmake \
                  -DCMAKE_BUILD_TYPE=Release \
                  -DWITH_DAEMON=ON \
                  -DWITH_REPLAY=ON \
                  -DWITH_CONVERT=OFF \
                  -DWITH_SLAM=OFF \
                  -DWITH_GIT_INFO=OFF \
                  -DCMAKE_LIBRARY_PATH=/usr/lib/aarch64-linux-gnu \
                  -DJPEG_TURBO_ROOT_DIR=/opt/libjpeg-turbo \
                  -Dforce-git-info="${VERSION}"
                make -j"$(nproc)"

          package_arm64:
            step: Command
            name: 打包 arm64 deb
            with:
              run: |
                VERSION="$(cat "${WORK_SPACE}/build_version_arm64")"
                bash scripts/make_artifacts.sh arm64
                mkdir -p dist
                bash scripts/make_deb.sh "${VERSION}" artifacts dist arm64
                echo "[ci] arm64 产物："
                ls -lh dist/*.deb

          upload_arm64:
            step: ArtifactUpload
            name: 上传 arm64 deb
            with:
              uploadType: flowPublic
              artifact: arm64_deb
              filePath:
                - dist/

      # ── Job B: amd64 deb ─────────────────────────────────────────────
      build_amd64:
        name: 编译 amd64
        runsOn:
          group: public/cn-hangzhou
          container: ubuntu:22.04

        steps:
          extract_version_amd64:
            step: Command
            name: 提取版本号
            with:
              run: |
                TAG="${GIT_BRANCH:-${PIPELINE_GIT_BRANCH:-}}"
                VERSION="${TAG#refs/tags/}"
                VERSION="${VERSION#v}"
                [ -z "${VERSION}" ] && VERSION="dev"
                echo "${VERSION}" > "${WORK_SPACE}/build_version_amd64"
                echo "[ci] amd64 version = ${VERSION}"

          install_deps:
            step: Command
            name: 安装编译依赖
            with:
              run: |
                export DEBIAN_FRONTEND=noninteractive
                apt-get update -qq
                apt-get install -y --no-install-recommends \
                  build-essential cmake make git pkg-config \
                  libusb-1.0-0-dev \
                  libboost-dev libboost-filesystem-dev libboost-thread-dev \
                  libboost-program-options-dev \
                  libevent-dev libconfig++-dev \
                  libthrift-dev thrift-compiler \
                  libturbojpeg0-dev \
                  dpkg-dev
                # turbojpeg cmake 路径适配
                mkdir -p /opt/libjpeg-turbo/lib64 /opt/libjpeg-turbo/include
                ln -sf /usr/lib/x86_64-linux-gnu/libturbojpeg.so \
                       /opt/libjpeg-turbo/lib64/libturbojpeg.so
                ln -sf /usr/include/turbojpeg.h \
                       /opt/libjpeg-turbo/include/turbojpeg.h

          compile_amd64:
            step: Command
            name: 编译
            with:
              run: |
                VERSION="$(cat "${WORK_SPACE}/build_version_amd64")"
                mkdir -p build_amd64 && cd build_amd64
                cmake .. \
                  -DCMAKE_BUILD_TYPE=Release \
                  -DWITH_DAEMON=ON \
                  -DWITH_REPLAY=ON \
                  -DWITH_CONVERT=OFF \
                  -DWITH_SLAM=OFF \
                  -DWITH_GIT_INFO=OFF \
                  -DJPEG_TURBO_ROOT_DIR=/opt/libjpeg-turbo \
                  -Dforce-git-info="${VERSION}"
                make -j"$(nproc)"

          package_amd64:
            step: Command
            name: 打包 deb
            with:
              run: |
                VERSION="$(cat "${WORK_SPACE}/build_version_amd64")"
                bash scripts/make_artifacts.sh amd64
                mkdir -p dist
                bash scripts/make_deb.sh "${VERSION}" artifacts dist amd64
                echo "[ci] amd64 产物："
                ls -lh dist/*.deb

          upload_amd64:
            step: ArtifactUpload
            name: 上传 amd64 deb
            with:
              uploadType: flowPublic
              artifact: amd64_deb
              filePath:
                - dist/

  # ── Stage 2: 汇总 ────────────────────────────────────────────────────
  release_stage:
    name: 发布汇总
    jobs:
      notify:
        name: 打印产物信息
        runsOn: public/cn-hangzhou
        steps:
          print_info:
            step: Command
            name: 发布完成
            with:
              run: |
                TAG="${GIT_BRANCH:-${PIPELINE_GIT_BRANCH:-}}"
                VERSION="${TAG#refs/tags/}"
                VERSION="${VERSION#v}"
                echo "=========================================="
                echo "  hera-daemon v${VERSION} 发布完成"
                echo "=========================================="
                echo ""
                echo "制品（可在云效 → 制品 中下载）："
                echo "  arm64: hera-daemon_${VERSION}_arm64.deb"
                echo "  amd64: hera-daemon_${VERSION}_amd64.deb"
                echo ""
                echo "Jetson 安装："
                echo "  sudo dpkg -i hera-daemon_${VERSION}_arm64.deb"
