# 云效流水线配置 - hera-daemon 自动发布
#
# 触发条件：推送 v* 格式的 git tag（如 v4.10.0）
#
# 产物：
#   - hera-daemon_<version>_arm64.deb  → Jetson 安装包（主要产物）
#   - hera-daemon_<version>_amd64.deb  → x86 安装包
#
# 前置准备（一次性操作）：
#   1. 云效 → 制品管理 → 新建"通用制品仓库"，名称填入下方 ARTIFACT_REPO
#   2. （可选）将 Insta360 CameraSDK arm64 压缩包上传到 OSS，
#      获取 presigned URL 后在流水线变量中设置 INSTA_SDK_OSS_URL（私密变量）
#   3. arm64 构建耗时较长（QEMU 模拟约 30-60 分钟），建议使用云效私有资源组
#      绑定 Jetson 作为 arm64 原生 runner，详见下方注释

version: "1.0"
name: hera-release
displayName: Hera 发布流水线

triggers:
  push:
    tags:
      - refs/tags/v*

env:
  ARTIFACT_REPO: "hera-packages"

stages:
  # ── Stage 1: 并行构建 amd64 + arm64 ────────────────────────────────────────
  - stage:
      name: build
      displayName: 编译

      jobs:
        # ── Job A: arm64 Jetson deb（主要产物）─────────────────────────────
        - job:
            name: build-arm64
            displayName: 编译 arm64 (Jetson)

            # 若有 Jetson 自建机器（原生 arm64），将 type 改为 private，
            # label 改为在云效私有资源组中注册的机器标签，速度可提升 5-10x。
            # 方法：在 Jetson 上安装云效 Agent（docs.aliyun.com/yunxiao/runner）
            # 注册后将 label 改为机器标签，并删除下方 steps 中的 QEMU 注册步骤。
            machine:
              type: public
              label: linux

            steps:
              - step: command@1
                name: 提取版本号
                properties:
                  run: |
                    VERSION="${PIPELINE_GIT_BRANCH#refs/tags/v}"
                    echo "VERSION=${VERSION}" >> "$PIPELINE_ENV"
                    echo "[ci] version = ${VERSION}"

              - step: command@1
                name: 安装 Docker + 注册 QEMU arm64 模拟器
                properties:
                  run: |
                    # 公共资源组已预装 Docker；若报错则取消注释下方安装步骤
                    # apt-get update -qq && apt-get install -y docker.io
                    docker version
                    # 注册 arm64 binfmt，使 x86 机器可运行 arm64 容器
                    docker run --rm --privileged \
                      tonistiigi/binfmt:latest --install arm64
                    docker buildx create --use --name arm64-builder \
                      --driver docker-container 2>/dev/null || true
                    docker buildx inspect arm64-builder --bootstrap

              - step: command@1
                name: 构建 arm64 deb（Docker buildx + QEMU）
                properties:
                  run: |
                    # INSTA_SDK_OSS_URL 是私密变量，不设置时不编译摄像头驱动
                    SDK_ARG=""
                    if [ -n "${INSTA_SDK_OSS_URL:-}" ]; then
                      SDK_ARG="--build-arg INSTA_SDK_URL=${INSTA_SDK_OSS_URL}"
                    fi

                    mkdir -p dist
                    docker buildx build \
                      --platform linux/arm64 \
                      --builder arm64-builder \
                      --build-arg VERSION="${VERSION}" \
                      ${SDK_ARG} \
                      --output "type=local,dest=./dist" \
                      -f cloud/docker/Dockerfile.build-arm64 \
                      .

                    echo "[ci] arm64 deb:"
                    ls -lh dist/*.deb

              - step: upload_artifact@1
                name: 上传 arm64 deb
                properties:
                  source: dist/
                  artifactName: "hera-daemon_${VERSION}_arm64"
                  repository: "${ARTIFACT_REPO}"

        # ── Job B: amd64 deb ────────────────────────────────────────────────
        - job:
            name: build-amd64
            displayName: 编译 amd64

            machine:
              type: public
              label: linux

            container:
              image: ubuntu:22.04

            steps:
              - step: command@1
                name: 安装编译依赖
                properties:
                  run: |
                    export DEBIAN_FRONTEND=noninteractive
                    apt-get update -qq
                    apt-get install -y --no-install-recommends \
                      build-essential cmake make git pkg-config \
                      libusb-1.0-0-dev \
                      libboost-dev libboost-filesystem-dev libboost-thread-dev \
                      libboost-program-options-dev \
                      libevent-dev libconfig++-dev \
                      libthrift-dev thrift-compiler \
                      libturbojpeg0-dev \
                      dpkg-dev

                    # turbojpeg 路径适配
                    mkdir -p /opt/libjpeg-turbo/lib64 /opt/libjpeg-turbo/include
                    ln -sf /usr/lib/x86_64-linux-gnu/libturbojpeg.so \
                           /opt/libjpeg-turbo/lib64/libturbojpeg.so
                    ln -sf /usr/include/turbojpeg.h \
                           /opt/libjpeg-turbo/include/turbojpeg.h

              - step: command@1
                name: 提取版本号
                properties:
                  run: |
                    VERSION="${PIPELINE_GIT_BRANCH#refs/tags/v}"
                    echo "VERSION=${VERSION}" >> "$PIPELINE_ENV"
                    echo "[ci] version = ${VERSION}"

              - step: command@1
                name: 编译 amd64
                properties:
                  run: |
                    mkdir -p build_amd64 && cd build_amd64
                    cmake .. \
                      -DCMAKE_BUILD_TYPE=Release \
                      -DWITH_DAEMON=ON \
                      -DWITH_REPLAY=ON \
                      -DWITH_CONVERT=OFF \
                      -DWITH_SLAM=OFF \
                      -DWITH_GIT_INFO=OFF \
                      -DJPEG_TURBO_ROOT_DIR=/opt/libjpeg-turbo \
                      -Dforce-git-info="${VERSION}"
                    make -j"$(nproc)"

              - step: command@1
                name: 收集产物 + 打包 deb
                properties:
                  run: |
                    bash scripts/make_artifacts.sh amd64
                    bash scripts/make_deb.sh "${VERSION}" artifacts dist amd64
                    echo "[ci] amd64 deb:"
                    ls -lh dist/*.deb

              - step: upload_artifact@1
                name: 上传 amd64 deb
                properties:
                  source: dist/
                  artifactName: "hera-daemon_${VERSION}_amd64"
                  repository: "${ARTIFACT_REPO}"

  # ── Stage 2: 发布汇总 ───────────────────────────────────────────────────────
  - stage:
      name: release
      displayName: 发布汇总

      jobs:
        - job:
            name: notify
            displayName: 发布完成通知

            machine:
              type: public
              label: linux

            steps:
              - step: command@1
                name: 打印产物信息
                properties:
                  run: |
                    VERSION="${PIPELINE_GIT_BRANCH#refs/tags/v}"
                    echo "=== hera-daemon v${VERSION} 发布完成 ==="
                    echo "arm64 deb: 制品仓库 ${ARTIFACT_REPO} / hera-daemon_${VERSION}_arm64"
                    echo "amd64 deb: 制品仓库 ${ARTIFACT_REPO} / hera-daemon_${VERSION}_amd64"
                    echo ""
                    echo "Jetson 安装命令："
                    echo "  # 从制品仓库下载后："
                    echo "  sudo dpkg -i hera-daemon_${VERSION}_arm64.deb"
