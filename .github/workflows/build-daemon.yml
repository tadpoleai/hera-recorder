name: Build Jetson Daemon

# Triggers on v* tag push (e.g. v4.10.0)
on:
  push:
    tags:
      - 'v*'

jobs:
  build-arm64:
    name: Cross-compile arm64 .deb
    runs-on: ubuntu-22.04

    permissions:
      contents: write   # create GitHub Releases
      packages: read    # pull from ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "[ci] version = ${VERSION}"

      - name: Login to ghcr.io
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build arm64 .deb inside builder container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e VERSION="${{ env.VERSION }}" \
            ghcr.io/tadpoleai/jetson-builder:r36.4 \
            bash -c '
              set -e

              # Install host-side tools the image may not include
              apt-get update -qq
              apt-get install -y --no-install-recommends dpkg-dev thrift-compiler git

              # Cross-compile Livox SDK2 (open-source, not bundled in image)
              git clone --depth 1 https://github.com/Livox-SDK/Livox-SDK2.git /tmp/Livox-SDK2
              cd /tmp/Livox-SDK2 && mkdir build && cd build
              cmake .. \
                -DCMAKE_TOOLCHAIN_FILE=/workspace/cmake/toolchain-aarch64.cmake \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_PREFIX=/usr/local
              make -j$(nproc) && make install

              # Cross-compile recorder
              cd /workspace
              export ARCH=aarch64
              export PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig
              export PKG_CONFIG_LIBDIR=/usr/lib/aarch64-linux-gnu/pkgconfig
              git config --global --add safe.directory /workspace
              mkdir -p build_arm64 && cd build_arm64
              cmake .. \
                -DCMAKE_TOOLCHAIN_FILE=../cmake/toolchain-aarch64.cmake \
                -DCMAKE_BUILD_TYPE=Release \
                -DWITH_DAEMON=ON \
                -DWITH_REPLAY=ON \
                -DWITH_CONVERT=OFF \
                -DWITH_SLAM=OFF \
                -DWITH_GIT_INFO=OFF \
                -DCMAKE_LIBRARY_PATH=/usr/lib/aarch64-linux-gnu \
                -DJPEG_TURBO_ROOT_DIR=/opt/libjpeg-turbo \
                -DLIVOX_SDK2_ROOT=/usr/local \
                -Dforce-git-info="${VERSION}"
              make -j$(nproc)

              # Package .deb
              cd /workspace
              bash scripts/make_artifacts.sh arm64
              mkdir -p dist
              bash scripts/make_deb.sh "${VERSION}" artifacts dist arm64
              echo "===== artifacts ====="
              ls -lh dist/*.deb
            '

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.deb
          generate_release_notes: true
