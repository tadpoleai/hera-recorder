name: Build Jetson Daemon

# Triggers on v* tag push (e.g. v4.10.0)
on:
  push:
    tags:
      - 'v*'

jobs:
  build-arm64:
    name: Cross-compile arm64 .deb
    runs-on: ubuntu-22.04
    # Use the pre-built cross-compile environment — has aarch64 toolchain,
    # boost/thrift/libconfig/libjpeg-turbo for arm64 already installed.
    container:
      image: ghcr.io/tadpoleai/jetson-builder:r36.4
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    permissions:
      contents: write   # needed to create GitHub Releases
      packages: read    # needed to pull from ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "[ci] version = ${VERSION}"

      - name: Install host tools (dpkg-dev, thrift-compiler)
        # The container has arm64 cross-compile libs pre-installed.
        # Only install host-side tools that may be missing.
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            dpkg-dev thrift-compiler git

      - name: Cross-compile and install Livox SDK2
        run: |
          git clone --depth 1 https://github.com/Livox-SDK/Livox-SDK2.git /tmp/Livox-SDK2
          cd /tmp/Livox-SDK2
          mkdir build && cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE="${GITHUB_WORKSPACE}/cmake/toolchain-aarch64.cmake" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local
          make -j$(nproc)
          make install

      - name: Cross-compile arm64
        run: |
          export ARCH=aarch64
          export PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig
          export PKG_CONFIG_LIBDIR=/usr/lib/aarch64-linux-gnu/pkgconfig
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"
          mkdir -p build_arm64 && cd build_arm64
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=../cmake/toolchain-aarch64.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DWITH_DAEMON=ON \
            -DWITH_REPLAY=ON \
            -DWITH_CONVERT=OFF \
            -DWITH_SLAM=OFF \
            -DWITH_GIT_INFO=OFF \
            -DCMAKE_LIBRARY_PATH=/usr/lib/aarch64-linux-gnu \
            -DJPEG_TURBO_ROOT_DIR=/opt/libjpeg-turbo \
            -DLIVOX_SDK2_ROOT=/usr/local \
            -Dforce-git-info="${VERSION}"
          make -j$(nproc)

      - name: Package .deb
        run: |
          bash scripts/make_artifacts.sh arm64
          mkdir -p dist
          bash scripts/make_deb.sh "${VERSION}" artifacts dist arm64
          echo "===== artifacts ====="
          ls -lh dist/*.deb

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.deb
          generate_release_notes: true
