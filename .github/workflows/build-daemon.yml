name: Build Jetson Daemon

# Triggers on v* tag push (e.g. v4.10.0)
# workflow_dispatch allows manual runs for verifying the runner/image setup
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  build-arm64:
    name: Build arm64 .deb (native)
    runs-on: ubuntu-24.04-arm
    container:
      image: ghcr.io/tadpoleai/jetson-builder:r36.4

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION:-0.0.0-ci}"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "[ci] version = ${VERSION}"

      - name: Setup git safe directory
        run: git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      - name: Build and install Livox SDK2
        run: bash scripts/build_livox_sdk2.sh

      - name: Build hera-daemon (native arm64, with Insta360 SDK)
        run: INSTA_SDK_ROOT=/opt/insta_sdk bash scripts/build_arm64.sh "${{ env.VERSION }}"

      - name: Package .deb
        run: |
          bash scripts/make_artifacts.sh arm64
          mkdir -p dist
          bash scripts/make_deb.sh "${{ env.VERSION }}" artifacts dist arm64
          echo "===== artifacts ====="
          ls -lh dist/*.deb

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.deb
          generate_release_notes: true
